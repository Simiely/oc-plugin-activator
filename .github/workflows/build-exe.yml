name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: 设置 Python（带 tkinter）
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: 检查 tkinter
      shell: pwsh
      run: |
        python --version
        python -c "import tkinter; print('tkinter OK')" 2>&1
        if ($LASTEXITCODE -ne 0) {
          Write-Host "tkinter 不可用，尝试安装完整 Python..."
          choco install python --version=3.11.9 -y --force 2>&1 | Out-Null
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine")
          python --version
          python -c "import tkinter; print('tkinter OK')" 2>&1
        }

    - name: 安装 PyInstaller
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    - name: 打包 exe
      shell: pwsh
      run: |
        # 把完整输出保存到文件，方便排查
        python -m PyInstaller --onefile --console --name "OC_Activator" oc_tool.py 2>&1 | Tee-Object -FilePath "build_log.txt"
        $exitCode = $LASTEXITCODE
        Write-Host "EXIT_CODE=$exitCode"
        if ($exitCode -ne 0) {
          Write-Host "=== PyInstaller 日志文件内容 ==="
          Get-Content "OC_Activator.spec" -ErrorAction SilentlyContinue
          Write-Host "=== 详细 warn 文件 ==="
          Get-Content "build\OC_Activator\warn-OC_Activator.txt" -ErrorAction SilentlyContinue
          exit $exitCode
        }

    - name: 上传构建日志（失败时）
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          build_log.txt
          build/OC_Activator/warn-*.txt
          *.spec
        if-no-files-found: warn

    - name: 上传 exe
      uses: actions/upload-artifact@v4
      with:
        name: OC_Activator.exe
        path: dist/OC_Activator.exe
        if-no-files-found: error
