name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 安装依赖
      run: pip install pyinstaller

    - name: 打包 exe
      run: pyinstaller --onefile --windowed --name "OC插件快速激活工具" oc_tool.py

    - name: 上传 exe 作为 Artifact
      uses: actions/upload-artifact@v4
      with:
        name: OC插件快速激活工具.exe
        path: dist/OC插件快速激活工具.exe
