name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 安装依赖
      run: pip install pyinstaller

    - name: 打包 exe
      shell: pwsh
      run: |
        pyinstaller --onefile --windowed --icon icon.ico --add-data "icon.ico;." --name "Activator" oc_tool.py
        if ($LASTEXITCODE -ne 0) {
          exit $LASTEXITCODE
        }

    - name: 上传 exe
      uses: actions/upload-artifact@v4
      with:
        name: OC插件快速激活工具
        path: dist/Activator.exe
        if-no-files-found: error
