name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 检测环境
      shell: pwsh
      run: |
        python --version
        pip --version
        python -c "import tkinter; print('tkinter OK')" 2>&1
        echo "--- Python 安装路径 ---"
        where python
        Get-ChildItem -Path (python -c "import sys; print(sys.prefix)") -Recurse -Filter "tkinter*" -ErrorAction SilentlyContinue | Select-Object FullName

    - name: 安装 PyInstaller
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pyinstaller --version

    - name: 打包 exe（带详细日志）
      shell: pwsh
      run: |
        # 先用英文名试打包，确认基础流程正常
        pyinstaller --onefile --windowed --name "OC_Activator" oc_tool.py 2>&1
        Write-Host "Exit code: $LASTEXITCODE"
        if ($LASTEXITCODE -ne 0) {
          # 如果失败，尝试不带 --windowed 再试
          Write-Host "首次打包失败，尝试不带 --windowed 参数..."
          pyinstaller --onefile --name "OC_Activator" oc_tool.py 2>&1
          Write-Host "Exit code: $LASTEXITCODE"
        }
      continue-on-error: true

    - name: 检查 dist 目录
      shell: pwsh
      run: |
        if (Test-Path dist) {
          Get-ChildItem dist
        } else {
          Write-Host "dist 目录不存在"
          Get-ChildItem -Path . -Filter "*.exe" -Recurse
        }

    - name: 上传 exe 作为 Artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: OC插件快速激活工具
        path: dist/*.exe
        if-no-files-found: warn
