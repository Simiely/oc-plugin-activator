name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: 使用系统预装 Python
      shell: pwsh
      run: |
        # 使用 Windows runner 预装的 Python（自带 tkinter）
        $pythonPath = Get-Command python | Select-Object -ExpandProperty Source
        Write-Host "Python 路径: $pythonPath"
        python --version
        python -c "import tkinter; print('tkinter OK')"
        python -c "import tkinter; print('tkinter OK')" | Out-Host
        if ($LASTEXITCODE -ne 0) {
          Write-Host "系统 Python 无 tkinter，尝试 setup-python..."
          # 这里不做动作，后续步骤会重新 setup
        }

    - name: 安装 PyInstaller
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    - name: 打包 exe
      shell: pwsh
      run: |
        $ErrorActionPreference = "Stop"
        Write-Host "===== 开始打包 ====="
        pyinstaller --onefile --console --name "OC_Activator" oc_tool.py 2>&1
        Write-Host "===== 退出码: $LASTEXITCODE ====="
        if ($LASTEXITCODE -ne 0) {
          throw "PyInstaller 打包失败，退出码: $LASTEXITCODE"
        }
        Write-Host "===== 验证 exe ====="
        if (Test-Path "dist/OC_Activator.exe") {
          Write-Host "✅ exe 已生成"
          Get-Item "dist/OC_Activator.exe" | Select-Object Length,FullName
        } else {
          throw "exe 文件未生成！"
        }

    - name: 上传 exe
      uses: actions/upload-artifact@v4
      with:
        name: OC插件快速激活工具
        path: dist/OC_Activator.exe
        compression-level: 9
