name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    - name: 验证 Python 和 tkinter
      run: |
        python --version
        python -c "import tkinter; print('tkinter OK')"

    - name: 打包 exe
      run: |
        pyinstaller --onefile --windowed --name "OC插件快速激活工具" oc_tool.py 2>&1
      continue-on-error: true

    - name: 检查打包结果
      run: |
        dir dist 2>nul || echo "dist 目录不存在"
        if exist dist\*.exe (echo exe 文件已生成) else (echo exe 文件未生成)

    - name: 上传 exe 作为 Artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: OC插件快速激活工具.exe
        path: dist/OC插件快速激活工具.exe
        if-no-files-found: warn
